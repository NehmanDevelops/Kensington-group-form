<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kensington Corporate — Agent Entry</title>
<style>
  :root{
    --purple:#3A2F3C; --cream:#FDF9EC; --taupe:#767260; --green:#1A3E32;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--cream);
    font-family:Georgia,'Times New Roman',serif; color:var(--purple);
    display:flex; align-items:flex-start; justify-content:center; padding:40px 16px;
  }
  .card{
    width:100%; max-width:480px; background:#fff; border:1px solid #e7e1d2;
    border-radius:14px; box-shadow:0 8px 30px rgba(58,47,60,.08); overflow:hidden;
  }
  .head{ background:var(--taupe); padding:26px 28px 22px; text-align:center; }
  .head img{ height:34px; margin-bottom:10px; }
  .head .brand{ color:var(--cream); letter-spacing:3px; font-size:13px; text-transform:uppercase; }
  .body{ padding:28px; }
  h1{ font-size:22px; margin:0 0 4px; color:var(--purple); }
  .sub{ font-size:14px; color:var(--taupe); margin:0 0 22px; }
  label{ display:block; font-size:13px; font-weight:bold; margin:16px 0 6px; color:var(--purple); }
  label .req{ color:#9b3b34; }
  input{
    width:100%; padding:12px 14px; border:1px solid #d8d2c4; border-radius:8px;
    font-size:15px; font-family:inherit; background:var(--cream); color:var(--purple);
  }
  input:focus{ outline:none; border-color:var(--green); background:#fff; }
  .hint{ font-size:12px; color:var(--taupe); margin-top:5px; }
  button{
    width:100%; margin-top:26px; padding:14px; border:0; border-radius:8px;
    background:var(--green); color:var(--cream); font-size:16px; font-family:inherit;
    letter-spacing:1px; cursor:pointer; text-transform:uppercase;
  }
  button:disabled{ opacity:.55; cursor:default; }
  .msg{ margin-top:18px; font-size:14px; text-align:center; display:none; }
  .msg.ok{ display:block; color:var(--green); }
  .msg.err{ display:block; color:#9b3b34; }
  .success{ display:none; text-align:center; padding:10px 0; }
  .success h2{ color:var(--green); margin:8px 0; }
  .success p{ color:var(--taupe); font-size:14px; }
  .success button{ background:var(--taupe); max-width:200px; margin:18px auto 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <img src="kensington-logo-cream.png" alt="Kensington Corporate" onerror="this.style.display='none'">
      <div class="brand">Kensington Corporate</div>
    </div>
    <div class="body">
      <div id="form-wrap">
        <h1>Agent Entry</h1>
        <p class="sub">Add a traveller to the Group Master.</p>
        <form id="agentForm" autocomplete="off">
          <label for="groupId">Group ID <span class="req">*</span></label>
          <input id="groupId" name="groupId" required placeholder="e.g. 1OEGLOASEP26" />

          <label for="firstName">First Name <span class="req">*</span></label>
          <input id="firstName" name="firstName" required />

          <label for="lastName">Last Name <span class="req">*</span></label>
          <input id="lastName" name="lastName" required />

          <label for="additionalAgents">Additional Agent Notes</label>
          <input id="additionalAgents" name="additionalAgents" placeholder="Notes about additional agents" />
          <div class="hint">Optional.</div>

          <button type="submit" id="submitBtn">Submit</button>
          <div class="msg" id="msg"></div>
        </form>
      </div>

      <div class="success" id="success">
        <h2>✓ Submitted</h2>
        <p>The traveller was added to the Group Master.</p>
        <button type="button" onclick="resetForm()">Add another</button>
      </div>
    </div>
  </div>

<script>
  const form = document.getElementById('agentForm');
  const btn  = document.getElementById('submitBtn');
  const msg  = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg'; msg.textContent = '';
    const payload = {
      groupId:          document.getElementById('groupId').value.trim(),
      firstName:        document.getElementById('firstName').value.trim(),
      lastName:         document.getElementById('lastName').value.trim(),
      additionalAgents: document.getElementById('additionalAgents').value.trim(),
    };
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      const r = await fetch('/api/agentform', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || 'Something went wrong.');
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch (err) {
      msg.className = 'msg err';
      msg.textContent = err.message || 'Submission failed — please try again.';
    } finally {
      btn.disabled = false; btn.textContent = 'Submit';
    }
  });

  function resetForm(){
    form.reset();
    document.getElementById('success').style.display = 'none';
    document.getElementById('form-wrap').style.display = 'block';
  }
</script>
</body>
</html>
